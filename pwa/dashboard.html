<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#f7f6f3">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Manusilva — Técnico</title>
  <script src="js/force-refresh-page.js"></script>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700&family=Source+Serif+4:ital,wght@0,600;0,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css?v=clinica-v10">
  <link rel="stylesheet" href="css/tech.css?v=clinica-v16">
</head>
<body class="tech-dashboard-page">
  <div class="bg-mesh"></div>

  <div class="tech-app">
    <header class="tech-header tech-navbar">
      <div class="header-top tech-navbar__top">
        <div class="brand-compact tech-navbar__brand">
          <div class="brand-logo-sm brand-logo-slot" id="brand-logo" data-brand-logo aria-label="ManuSilva">MS</div>
          <div class="brand-text">
            <h1 id="brand-name" data-hide-if-logo>Manusilva</h1>
            <p id="brand-tagline" class="tech-navbar__tagline">Empilhadores · Manutenção · Baterias</p>
          </div>
        </div>
        <div class="header-actions tech-navbar__actions">
          <span class="connection-badge online tech-navbar__badge" id="connection-badge">
            <span class="connection-badge__dot" aria-hidden="true"></span>
            <span class="connection-badge__label" id="connection-badge-label">Online</span>
          </span>
          <button type="button" class="tech-refresh-btn" id="btn-force-app-refresh" title="Descarregar a versão mais recente da aplicação" aria-label="Atualizar app" onclick="return window.msForceAppRefresh(event)">
            <span class="tech-refresh-icon" aria-hidden="true">↻</span>
            <span class="tech-refresh-label">Atualizar</span>
          </button>
          <button type="button" class="tech-logout-btn" id="logout-btn" title="Terminar sessão" aria-label="Terminar sessão">
            <svg class="tech-logout-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" x2="9" y1="12" y2="12"/>
            </svg>
            <span class="tech-logout-label">Sair</span>
          </button>
        </div>
      </div>

      <div id="tech-connectivity-bar" class="tech-connectivity-bar tech-connectivity-bar--ok" role="status" aria-live="polite">
        <div class="tech-connectivity-bar__row">
          <span class="tech-connectivity-bar__dot" aria-hidden="true"></span>
          <span class="tech-connectivity-bar__text" id="tech-connectivity-text">A verificar sincronização…</span>
        </div>
        <button type="button" class="tech-connectivity-bar__sync-btn" id="tech-connectivity-sync-btn" hidden>Sincronizar</button>
      </div>

      <div class="tech-jobs-tabs tech-jobs-tabs--header" role="tablist" aria-label="Filtrar trabalhos">
        <button type="button" class="tech-jobs-tab is-active" data-tech-jobs-tab="agendados" role="tab" aria-selected="true" aria-label="Agendados">
          <span class="tech-jobs-tab__label">Agendados</span>
          <span class="tech-jobs-tab__badge" id="tech-tab-badge-agendados" hidden>0</span>
        </button>
        <button type="button" class="tech-jobs-tab" data-tech-jobs-tab="realizados" role="tab" aria-selected="false" aria-label="Histórico de Realizados">
          <span class="tech-jobs-tab__label">Realizados</span>
          <span class="tech-jobs-tab__badge tech-jobs-tab__badge--muted" id="tech-tab-badge-realizados" hidden>0</span>
        </button>
        <button type="button" class="tech-jobs-tab" data-tech-jobs-tab="clientes" role="tab" aria-selected="false" aria-label="Histórico de clientes">
          <span class="tech-jobs-tab__label">Clientes</span>
        </button>
      </div>

      <div id="tech-calendar-wrap">
        <div class="tech-calendar-toolbar">
          <div class="tech-cal-view-toggle" role="tablist" aria-label="Vista do calendário">
            <button type="button" class="tech-cal-view-btn is-active" data-tech-cal-view="week" role="tab" aria-selected="true">Semana</button>
            <button type="button" class="tech-cal-view-btn" data-tech-cal-view="month" role="tab" aria-selected="false">Mês</button>
          </div>
          <div class="tech-calendar-nav">
            <div class="tech-calendar-nav__period">
              <button type="button" id="tech-prev-period" aria-label="Período anterior">‹</button>
              <span id="tech-calendar-title"></span>
              <button type="button" id="tech-next-period" aria-label="Período seguinte">›</button>
            </div>
            <button type="button" id="tech-go-today" class="tech-go-today-btn" title="Ir para hoje">Hoje</button>
          </div>
          <button type="button" id="tech-calendar-compact-btn" class="tech-calendar-compact-btn" aria-pressed="false" title="Calendário compacto">▾</button>
        </div>
        <div class="tech-calendar-body vista-semanal">
          <div class="calendar-strip calendar-strip--week" id="calendar-strip" role="group" aria-label="Dias da semana"></div>
          <div class="tech-month-calendar" id="tech-month-calendar" hidden aria-label="Calendário mensal"></div>
        </div>
      </div>
    </header>

    <main id="app" class="tech-main">
      <section class="jobs-section" data-tech-jobs-shell>
        <div class="section-header">
          <h2 id="tech-jobs-section-title">Agendados</h2>
          <span class="date-label" id="selected-date-label"></span>
        </div>
        <div id="tech-day-summary" class="tech-day-summary" aria-live="polite"></div>
        <div id="tech-rejected-banner" class="tech-rejected-banner" hidden></div>
        <div class="tech-jobs-toolbar" id="tech-jobs-toolbar">
          <input
            type="search"
            id="tech-jobs-search"
            class="tech-jobs-search"
            placeholder="Pesquisar cliente ou serviço…"
            autocomplete="off"
            aria-label="Pesquisar trabalhos"
          >
        </div>
        <div class="jobs-list" id="jobs-list"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    try {
      const bust = Date.now();
      const { runManusilvaEntry, handleBootstrapFailure } = await import(
        `./js/bootstrap-entry.js?_=${bust}`
      );
      await runManusilvaEntry('tech', {
        registerServiceWorker: true,
        onRemoteBuild: () => {
          window.dispatchEvent(new CustomEvent('manusilva-app-update-available'));
        },
      });
    } catch (err) {
      const { handleBootstrapFailure } = await import(`./js/bootstrap-entry.js?_=${Date.now()}`);
      await handleBootstrapFailure(err);
    }
  </script>
</body>
</html>
