<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Manusilva — Técnico</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=form-layout-v17">
</head>
<body class="tech-dashboard-page">
  <script src="js/theme-boot.js"></script>
  <div class="bg-mesh"></div>

  <div class="tech-app">
    <header class="tech-header tech-navbar">
      <div class="header-top tech-navbar__top">
        <div class="brand-compact tech-navbar__brand">
          <div class="brand-logo-sm brand-logo-slot" id="brand-logo" data-brand-logo aria-label="ManuSilva">MS</div>
          <div class="brand-text">
            <h1 id="brand-name" data-hide-if-logo>Manusilva</h1>
            <p id="brand-tagline" class="tech-navbar__tagline">Empilhadores · Manutenção · Baterias</p>
          </div>
        </div>
        <div class="header-actions tech-navbar__actions">
          <span class="connection-badge online tech-navbar__badge" id="connection-badge">
            <span class="connection-badge__dot" aria-hidden="true"></span>
            <span class="connection-badge__label" id="connection-badge-label">Online</span>
          </span>
          <button type="button" id="theme-toggle" class="theme-toggle-btn theme-toggle-btn--inline tech-navbar__theme" aria-label="Alternar tema" title="Alternar tema">
            <span id="theme-icon" aria-hidden="true"></span>
          </button>
          <button type="button" class="tech-logout-btn" id="logout-btn" title="Terminar sessão" aria-label="Terminar sessão">
            <svg class="tech-logout-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" x2="9" y1="12" y2="12"/>
            </svg>
            <span class="tech-logout-label">Sair</span>
          </button>
        </div>
      </div>

      <div class="offline-control tech-navbar__offline">
        <span class="toggle-label" id="offline-label">Online</span>
        <label class="toggle-switch-wrap">
          <input type="checkbox" id="offline-toggle">
          <span class="toggle-track"></span>
        </label>
      </div>

      <div id="tech-sync-status" class="tech-sync-status" role="status" aria-live="polite">
        <span class="tech-sync-status__dot" aria-hidden="true"></span>
        <span class="tech-sync-status__text" id="tech-sync-status-text">A verificar sincronização…</span>
        <button type="button" class="tech-sync-status__btn" id="tech-sync-refresh-btn" hidden>Sincronizar</button>
      </div>

      <div id="offline-sync-bar" class="offline-sync-banner" hidden role="status" aria-live="polite">
        <div class="offline-sync-banner__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
            <path d="M16 16h5v5"/>
          </svg>
        </div>
        <div class="offline-sync-banner__body">
          <p class="offline-sync-banner__title" id="offline-sync-title"></p>
          <p class="offline-sync-banner__desc" id="offline-sync-desc"></p>
        </div>
        <span class="offline-sync-banner__count" id="offline-sync-count" hidden></span>
        <button type="button" class="offline-sync-banner__action" id="offline-sync-btn">
          <svg class="offline-sync-banner__action-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" x2="12" y1="3" y2="15"/>
          </svg>
          <span class="offline-sync-banner__action-label">Sincronizar Agora</span>
        </button>
      </div>

      <div class="tech-jobs-tabs tech-jobs-tabs--header" role="tablist" aria-label="Filtrar trabalhos">
        <button type="button" class="tech-jobs-tab" data-tech-jobs-tab="em_curso" role="tab" aria-selected="false">Em Curso / Pendentes</button>
        <button type="button" class="tech-jobs-tab is-active" data-tech-jobs-tab="agendados" role="tab" aria-selected="true">Agendados</button>
        <button type="button" class="tech-jobs-tab" data-tech-jobs-tab="realizados" role="tab" aria-selected="false">Histórico de Realizados</button>
      </div>

      <div id="tech-calendar-wrap">
        <div class="tech-calendar-toolbar">
          <div class="tech-cal-view-toggle" role="tablist" aria-label="Vista do calendário">
            <button type="button" class="tech-cal-view-btn is-active" data-tech-cal-view="week" role="tab" aria-selected="true">Semana</button>
            <button type="button" class="tech-cal-view-btn" data-tech-cal-view="month" role="tab" aria-selected="false">Mês</button>
          </div>
          <div class="calendar-nav tech-calendar-nav">
            <button type="button" id="tech-prev-period" aria-label="Período anterior">‹</button>
            <span id="tech-calendar-title"></span>
            <button type="button" id="tech-next-period" aria-label="Período seguinte">›</button>
          </div>
        </div>
        <div class="tech-calendar-body vista-semanal">
          <div class="calendar-strip calendar-strip--week" id="calendar-strip" role="group" aria-label="Dias da semana"></div>
          <div class="tech-month-calendar" id="tech-month-calendar" hidden aria-label="Calendário mensal"></div>
        </div>
      </div>
    </header>

    <main id="app" class="tech-main">
      <section class="jobs-section" data-tech-jobs-shell>
        <div class="section-header">
          <h2 id="tech-jobs-section-title">Agendados</h2>
          <span class="date-label" id="selected-date-label"></span>
        </div>
        <p class="text-muted tech-greeting">
          Olá, <strong id="user-name"></strong>
        </p>
        <div class="jobs-list" id="jobs-list"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/vendor/jspdf.umd.min.js" data-jspdf defer></script>
  <script src="js/vendor/jspdf.plugin.autotable.min.js" data-jspdf-autotable defer></script>
  <script type="module">
    import { initLocalDatabase, warmClientsCatalog, warmOperacoes, handleFatalDashboardError } from './js/app.js';
    import { initTechDashboard } from './js/tech-dashboard.js';
    import { initLogoutButton } from './js/auth.js';
    import { applyThemeToDocument, themeToggleIcon, toggleTheme } from './js/theme.js';

    applyThemeToDocument();
    const themeBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    if (themeIcon) themeIcon.textContent = themeToggleIcon();
    themeBtn?.addEventListener('click', () => {
      const next = toggleTheme();
      if (themeIcon) themeIcon.textContent = themeToggleIcon(next);
    });

    // Botão Sair ativo antes de qualquer carregamento de dados
    initLogoutButton();
    initLocalDatabase();

    let fatalSessionError = false;
    try {
      await warmClientsCatalog();
      await warmOperacoes();
    } catch (error) {
      fatalSessionError = await handleFatalDashboardError(error);
    }

    if (!fatalSessionError) {
      initTechDashboard();
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js?v=v6').catch(() => {});
    }
  </script>
</body>
</html>
