<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#f7f6f3">
  <meta name="description" content="Manusilva — Gestão de Empilhadores, Manutenção e Baterias">
  <title>Manusilva — Login</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700&family=Source+Serif+4:ital,wght@0,600;0,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css?v=clinica-v12">
  <script>
    (function purgeStalePwaCache() {
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) { caches.delete(k); });
          });
        }
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>
<body>
  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    try {
      const bust = Date.now();
      const { runManusilvaEntry, handleBootstrapFailure } = await import(
        `./js/bootstrap-entry.js?_=${bust}`
      );
      await runManusilvaEntry('login');
    } catch (err) {
      const { handleBootstrapFailure } = await import(`./js/bootstrap-entry.js?_=${Date.now()}`);
      const recovered = await handleBootstrapFailure(err);
      if (!recovered) {
        document.getElementById('app').innerHTML =
          '<p style="padding:1.5rem;font-family:Source Sans 3,system-ui,sans-serif">Não foi possível carregar a aplicação. Usa «Atualizar app» ou limpa os dados do site no browser.</p>';
      }
    }
  </script>
</body>
</html>
