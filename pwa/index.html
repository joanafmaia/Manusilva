<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#f8fafc">
  <meta name="description" content="Manusilva — Gestão de Empilhadores, Manutenção e Baterias">
  <title>Manusilva — Login</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=light-only-v3">
  <script>
    (function purgeStalePwaCache() {
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) { caches.delete(k); });
          });
        }
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>
<body>
  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    try {
      const { APP_BUILD_ID } = await import('./js/build-version.js');
      const v = APP_BUILD_ID;
      const { ensureFreshAppBuild, recoverFromModuleLoadFailure, clearModuleRecoveryFlag } =
        await import(`./js/app-version.js?v=${v}`);
      if (await ensureFreshAppBuild()) {
        /* recarrega com build novo */
      } else {
        const { bootstrapApp } = await import(`./js/app.js?v=${v}`);
        bootstrapApp('app');
        clearModuleRecoveryFlag();
      }
    } catch (err) {
      console.error('[Manusilva] Falha ao carregar:', err);
      const { recoverFromModuleLoadFailure } = await import('./js/app-version.js');
      if (!(await recoverFromModuleLoadFailure())) {
        document.getElementById('app').innerHTML =
          '<p style="padding:1.5rem;font-family:Inter,sans-serif">Não foi possível carregar a aplicação. Limpa os dados do site no browser e recarrega.</p>';
      }
    }
  </script>
</body>
</html>
