<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#f7f6f3">
  <title>Manusilva — Armazém</title>
  <script src="js/force-refresh-page.js"></script>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700&family=Source+Serif+4:ital,wght@0,600;0,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css?v=clinica-v10">
  <link rel="stylesheet" href="css/tech.css?v=clinica-v19">
  <link rel="stylesheet" href="css/warehouse.css?v=clinica-v3">
</head>
<body class="warehouse-page">
  <div class="bg-mesh"></div>

  <div class="warehouse-app">
    <header class="warehouse-topbar">
      <div class="warehouse-topbar__brand">
        <div class="brand-logo-sm brand-logo-slot" id="brand-logo" data-brand-logo aria-label="ManuSilva">MS</div>
        <div class="warehouse-topbar__brand-text">
          <strong id="brand-name" data-hide-if-logo>Manusilva</strong>
          <p class="warehouse-topbar__tagline">Oficina · Armazém · Reparações</p>
        </div>
      </div>

      <div class="warehouse-topbar__actions">
        <p class="warehouse-topbar__greeting">Olá, <strong id="user-name"></strong></p>
        <button type="button" class="btn-primary warehouse-create-btn" id="warehouse-create-folha-btn">
          + Criar Folha de Obra
        </button>
        <button type="button" class="tech-refresh-btn warehouse-refresh-btn" id="btn-force-app-refresh" title="Descarregar a versão mais recente da aplicação" aria-label="Atualizar app">
          <span class="tech-refresh-icon" aria-hidden="true">↻</span>
          <span class="tech-refresh-label">Atualizar</span>
        </button>
        <button type="button" class="btn-outline warehouse-logout-btn" id="logout-btn">
          Terminar sessão
        </button>
      </div>
    </header>

    <main class="warehouse-main">
      <div class="warehouse-content">
        <header class="warehouse-content__head">
          <div>
            <h1 class="warehouse-content__title">Folhas de Obra</h1>
            <p class="warehouse-content__subtitle">Equipamentos recebidos na oficina e histórico de reparações</p>
          </div>
        </header>
        <div id="warehouse-app-mount" class="warehouse-mount"></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/vendor/jspdf.umd.min.js" data-jspdf defer></script>
  <script src="js/vendor/jspdf.plugin.autotable.min.js" data-jspdf-autotable defer></script>
  <script type="module">
    try {
      const bust = Date.now();
      const { runManusilvaEntry } = await import(`./js/bootstrap-entry.js?_=${bust}`);
      await runManusilvaEntry('warehouse', {
        registerServiceWorker: true,
        onRemoteBuild: () => {
          window.dispatchEvent(new CustomEvent('manusilva-app-update-available'));
        },
      });
    } catch (err) {
      const { handleBootstrapFailure } = await import(`./js/bootstrap-entry.js?_=${Date.now()}`);
      await handleBootstrapFailure(err);
    }
  </script>
</body>
</html>
